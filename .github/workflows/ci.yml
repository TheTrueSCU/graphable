name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61427696e92600c02884c12c84b55296d527b # v4

      - name: Install uv
        uses: astral-sh/setup-uv@f986551039737c51bdec33ef4f453f3d35fa28d5 # v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fbbbd4ee # v5
        with:
          python-version-file: ".python-version"

      - name: Set up just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2


      - name: Install dependencies
        run: uv sync

      - name: Run checks
        run: just check

      - name: Verify CLI documentation sync
        run: |
          just docs-usage
          git diff --exit-code USAGE.md || (echo "CLI documentation is out of sync. Please run 'just docs-usage' and commit the changes." && exit 1)
