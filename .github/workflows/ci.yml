name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@f98609f8591bc595679f07a4485163913017f169 # v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491f01dee05 # v5
        with:
          python-version-file: ".python-version"

      - name: Install just
        uses: extractions/setup-just@dd310ad7a0d491bfae1198745a378932722df287 # v2

      - name: Install dependencies
        run: uv sync

      - name: Run checks
        run: just check

      - name: Verify CLI documentation sync
        run: |
          just docs-usage
          git diff --exit-code USAGE.md || (echo "CLI documentation is out of sync. Please run 'just docs-usage' and commit the changes." && exit 1)
