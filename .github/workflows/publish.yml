name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/graphable
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/checkout@eef61427696e92600c02884c12c84b55296d527b # v4

      - name: Install uv
        uses: astral-sh/setup-uv@f986551039737c51bdec33ef4f453f3d35fa28d5 # v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fbbbd4ee # v5
        with:
          python-version-file: ".python-version"

      - name: Build package
        run: uv build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@63304f351496d56475485f88475f795f1c033de1 # v1.12.4
